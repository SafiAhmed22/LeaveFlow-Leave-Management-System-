<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leave Requests - Leave Management System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --accent: #14b8a6;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --background: #f8fafc;
            --surface: #ffffff;
            --surface-light: #f1f5f9;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --border: #e2e8f0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--background);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--background);
            pointer-events: none;
            z-index: 0;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100vh;
            background: var(--surface);
            border-right: 1px solid var(--border);
            padding: 32px 20px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 8px rgba(0, 0, 0, 0.05);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 48px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 800;
            color: white;
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.3);
        }

        .logo-text h1 {
            font-family: 'Sora', sans-serif;
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo-text p {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .nav-menu {
            list-style: none;
            flex: 1;
        }

        .nav-item {
            margin-bottom: 8px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 18px;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .nav-link::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: -1;
        }

        .nav-link:hover::before,
        .nav-link.active::before {
            opacity: 0.1;
        }

        .nav-link:hover,
        .nav-link.active {
            color: var(--text-primary);
            transform: translateX(4px);
        }

        .nav-link.active {
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
        }

        .nav-icon {
            font-size: 22px;
            width: 24px;
            text-align: center;
        }

        .sidebar-footer {
            margin-top: auto;
            padding-top: 24px;
            border-top: 1px solid var(--border);
            position: relative;
        }

        .user-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: var(--surface-light);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .user-card:hover {
            background: var(--border);
        }

        .user-avatar {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
        }

        .user-info h3 {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .user-info p {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .user-menu {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 72px;
            padding: 6px;
            background: var(--surface-light);
            border-radius: 10px;
            border: 1px solid var(--border);
            box-shadow: 0 12px 30px rgba(15, 23, 42, 0.4);
            display: none;
            z-index: 20;
        }

        .user-menu button {
            width: 100%;
            padding: 8px 10px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(135deg, var(--danger), #f97373);
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .user-menu button span {
            font-size: 16px;
        }

        /* Main Content */
        .main-content {
            margin-left: 280px;
            padding: 40px;
            position: relative;
            z-index: 1;
        }

        .page-header {
            margin-bottom: 40px;
            animation: fadeInUp 0.6s ease;
        }

        .page-title {
            font-family: 'Sora', sans-serif;
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--text-primary), var(--text-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .page-subtitle {
            color: var(--text-secondary);
            font-size: 16px;
        }

        /* Filter Tabs */
        .filter-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
            animation: fadeInUp 0.6s ease 0.1s backwards;
        }

        .filter-tab {
            padding: 12px 24px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-tab:hover,
        .filter-tab.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-color: var(--primary);
            color: white;
            transform: translateY(-2px);
        }

        /* Leave Requests Grid */
        .requests-grid {
            display: grid;
            gap: 24px;
            margin-bottom: 40px;
        }

        .request-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 28px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            animation: fadeInUp 0.6s ease backwards;
            position: relative;
            overflow: hidden;
        }

        .request-card:nth-child(1) { animation-delay: 0.2s; }
        .request-card:nth-child(2) { animation-delay: 0.3s; }
        .request-card:nth-child(3) { animation-delay: 0.4s; }
        .request-card:nth-child(4) { animation-delay: 0.5s; }

        .request-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .request-card:hover {
            transform: translateX(8px);
            border-color: var(--primary);
            box-shadow: 0 12px 32px rgba(99, 102, 241, 0.15);
        }

        .request-card:hover::before {
            opacity: 1;
        }

        .request-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .employee-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .employee-avatar {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 20px;
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.3);
        }

        .employee-details h3 {
            font-family: 'Sora', sans-serif;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .employee-details p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .status-badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-badge.pending {
            background: rgba(245, 158, 11, 0.15);
            color: var(--warning);
            border: 1px solid var(--warning);
        }

        .status-badge.approved {
            background: rgba(34, 197, 94, 0.15);
            color: var(--success);
            border: 1px solid var(--success);
        }

        .status-badge.rejected {
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        .request-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .detail-box {
            padding: 16px;
            background: var(--surface-light);
            border-radius: 12px;
        }

        .detail-label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .detail-value {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .reason-box {
            padding: 16px;
            background: var(--surface-light);
            border-radius: 12px;
            margin-bottom: 24px;
        }

        .reason-label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .reason-text {
            font-size: 14px;
            color: var(--text-primary);
            line-height: 1.6;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
        }

        .btn {
            flex: 1;
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'DM Sans', sans-serif;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            justify-content: center;
        }

        .btn-approve {
            background: var(--success);
            color: white;
        }

        .btn-approve:hover {
            background: #16a34a;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(34, 197, 94, 0.3);
        }

        .btn-reject {
            background: var(--danger);
            color: white;
        }

        .btn-reject:hover {
            background: #dc2626;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(239, 68, 68, 0.3);
        }

        /* Quick Action Section */
        .quick-action {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px;
            margin-bottom: 40px;
            animation: fadeInUp 0.6s ease 0.1s backwards;
        }

        .quick-action-title {
            font-family: 'Sora', sans-serif;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 16px;
            align-items: end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .form-input {
            padding: 14px 16px;
            background: var(--surface-light);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 15px;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .btn-group {
            display: flex;
            gap: 12px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(99, 102, 241, 0.4);
        }

        .btn-secondary {
            background: var(--danger);
            color: white;
        }

        .btn-secondary:hover {
            background: #dc2626;
            transform: translateY(-2px);
        }

        /* Message */
        .message {
            padding: 16px 20px;
            border-radius: 12px;
            margin-top: 20px;
            font-weight: 600;
            animation: fadeInUp 0.4s ease;
            display: none;
        }

        .message.show {
            display: block;
        }

        .message.success {
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid var(--success);
            color: var(--success);
        }

        .message.error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid var(--danger);
            color: var(--danger);
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .sidebar {
                transform: translateX(-100%);
            }

            .main-content {
                margin-left: 0;
                padding: 24px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .action-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="logo">
            <div class="logo-icon">LF</div>
            <div class="logo-text">
                <h1>LeaveFlow</h1>
                <p>Admin Panel</p>
            </div>
        </div>

        <ul class="nav-menu">
            <li class="nav-item">
                <a href="dashboard.html" class="nav-link">
                    <span>Dashboard</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="employees.html" class="nav-link">
                    <span>Employees</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="leave-requests.html" class="nav-link active">
                    <span>Leave Requests</span>
                </a>
            </li>
        </ul>

        <div class="sidebar-footer">
            <div class="user-card" onclick="toggleUserMenu(event)">
                <div class="user-avatar">AD</div>
                <div class="user-info">
                    <h3>Admin User</h3>
                    <p>Administrator</p>
                </div>
            </div>
            <div class="user-menu" id="adminUserMenu">
                <button type="button" onclick="handleLogout()">
                    <span>⏏</span>
                    <span>Logout</span>
                </button>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <div class="page-header">
            <h1 class="page-title">Leave Requests</h1>
            <p class="page-subtitle">Review and manage employee leave applications</p>
        </div>

        <!-- Quick Action -->
        <div class="quick-action">
            <h2 class="quick-action-title">Quick Action by ID</h2>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Employee ID</label>
                    <input type="text" class="form-input" id="quickActionId" placeholder="Enter employee ID (e.g., EMP001)">
                </div>
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="approveById()">Approve</button>
                    <button class="btn btn-secondary" onclick="rejectById()">Reject</button>
                </div>
            </div>
            <div class="message" id="quickActionMessage"></div>
        </div>

        <!-- Filter Tabs -->
        <div class="filter-tabs">
            <button class="filter-tab active" onclick="filterRequests('all')">All Requests</button>
            <button class="filter-tab" onclick="filterRequests('pending')">Pending</button>
            <button class="filter-tab" onclick="filterRequests('approved')">Approved</button>
            <button class="filter-tab" onclick="filterRequests('rejected')">Rejected</button>
        </div>

        <!-- Leave Requests Grid -->
        <div class="requests-grid" id="requestsGrid">
            <!-- Requests will be populated by JavaScript -->
        </div>
    </main>

    <script>
        // API Configuration
        const API_BASE = 'http://localhost:5000/api';

        // Helper function to extract numeric ID from "EMP001" format or use numeric ID
        function extractEmployeeId(idString) {
            const trimmed = idString.trim();
            // If it's in "EMP001" format, extract the number
            if (trimmed.toUpperCase().startsWith('EMP')) {
                return parseInt(trimmed.substring(3));
            }
            // Otherwise, try to parse as number
            return parseInt(trimmed);
        }

        let currentFilter = 'all';
        let leaveRequests = [];

        // Load leave requests from API
        async function loadLeaveRequests(filter = 'all') {
            try {
                const statusParam = filter === 'all' ? 'all' : filter;
                const response = await fetch(`${API_BASE}/leave-requests?status=${statusParam}`);
                
                if (!response.ok) {
                    throw new Error('Failed to fetch leave requests');
                }

                leaveRequests = await response.json();
                renderRequests();
            } catch (error) {
                console.error('Error loading leave requests:', error);
                document.getElementById('requestsGrid').innerHTML = 
                    '<p style="text-align: center; color: var(--text-secondary); padding: 40px;">Failed to load leave requests</p>';
            }
        }

        function renderRequests() {
            const grid = document.getElementById('requestsGrid');

            if (leaveRequests.length === 0) {
                grid.innerHTML = '<p style="text-align: center; color: var(--text-secondary); padding: 40px;">No requests found</p>';
                return;
            }

            grid.innerHTML = leaveRequests.map(request => {
                const initials = request.name.split(' ').map(n => n[0]).join('').toUpperCase();
                const empId = typeof request.employeeId === 'number' ? `EMP${String(request.employeeId).padStart(3, '0')}` : request.employeeId;
                
                return `
                    <div class="request-card" data-status="${request.status}">
                        <div class="request-header">
                            <div class="employee-info">
                                <div class="employee-avatar">${initials}</div>
                                <div class="employee-details">
                                    <h3>${request.name}</h3>
                                    <p>${empId} • ${request.department}</p>
                                </div>
                            </div>
                            <span class="status-badge ${request.status}">${request.status}</span>
                        </div>

                        <div class="request-details">
                            <div class="detail-box">
                                <div class="detail-label">Start Date</div>
                                <div class="detail-value">${formatDate(request.startDate)}</div>
                            </div>
                            <div class="detail-box">
                                <div class="detail-label">End Date</div>
                                <div class="detail-value">${formatDate(request.endDate)}</div>
                            </div>
                            <div class="detail-box">
                                <div class="detail-label">Duration</div>
                                <div class="detail-value">${request.leaveDays} Days</div>
                            </div>
                            <div class="detail-box">
                                <div class="detail-label">Applied On</div>
                                <div class="detail-value">${formatDate(request.appliedOn)}</div>
                            </div>
                        </div>

                        <div class="reason-box">
                            <div class="reason-label">Reason</div>
                            <div class="reason-text">${request.reason || 'No reason provided'}</div>
                        </div>

                        ${request.status === 'pending' ? `
                            <div class="action-buttons">
                                <button class="btn btn-approve" onclick="approveRequest(${request.leaveId})">Approve</button>
                                <button class="btn btn-reject" onclick="rejectRequest(${request.leaveId})">Reject</button>
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');
        }

        function formatDate(dateString) {
            if (!dateString) return 'N/A';
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        function filterRequests(status) {
            currentFilter = status;
            
            // Update active tab
            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');

            // Load requests with new filter
            loadLeaveRequests(status);
        }

        async function approveRequest(leaveId) {
            try {
                const response = await fetch(`${API_BASE}/leave-requests/${leaveId}/approve`, {
                    method: 'PATCH'
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Failed to approve leave request');
                }

                showNotification(data.message || 'Leave request approved!', 'success');
                // Reload requests to reflect the change
                loadLeaveRequests(currentFilter);
            } catch (error) {
                console.error('Error approving request:', error);
                showNotification(error.message || 'Failed to approve leave request', 'error');
            }
        }

        async function rejectRequest(leaveId) {
            try {
                const response = await fetch(`${API_BASE}/leave-requests/${leaveId}/reject`, {
                    method: 'PATCH'
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Failed to reject leave request');
                }

                showNotification(data.message || 'Leave request rejected!', 'error');
                // Reload requests to reflect the change
                loadLeaveRequests(currentFilter);
            } catch (error) {
                console.error('Error rejecting request:', error);
                showNotification(error.message || 'Failed to reject leave request', 'error');
            }
        }

        async function approveById() {
            const idInput = document.getElementById('quickActionId').value.trim();
            const message = document.getElementById('quickActionMessage');

            if (!idInput) {
                showMessage(message, 'error', 'Please enter an employee ID');
                return;
            }

            try {
                const employeeId = extractEmployeeId(idInput);
                if (isNaN(employeeId)) {
                    throw new Error('Invalid employee ID format');
                }

                const response = await fetch(`${API_BASE}/leave-requests/by-employee/${employeeId}/approve`, {
                    method: 'POST'
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Failed to approve leave');
                }

                showMessage(message, 'success', data.message || 'Leave approved!');
                document.getElementById('quickActionId').value = '';
                // Reload requests to reflect the change
                loadLeaveRequests(currentFilter);
            } catch (error) {
                console.error('Error approving by ID:', error);
                showMessage(message, 'error', error.message || 'Failed to approve leave');
            }
        }

        async function rejectById() {
            const idInput = document.getElementById('quickActionId').value.trim();
            const message = document.getElementById('quickActionMessage');

            if (!idInput) {
                showMessage(message, 'error', 'Please enter an employee ID');
                return;
            }

            try {
                const employeeId = extractEmployeeId(idInput);
                if (isNaN(employeeId)) {
                    throw new Error('Invalid employee ID format');
                }

                const response = await fetch(`${API_BASE}/leave-requests/by-employee/${employeeId}/reject`, {
                    method: 'POST'
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Failed to reject leave');
                }

                showMessage(message, 'success', data.message || 'Leave rejected!');
                document.getElementById('quickActionId').value = '';
                // Reload requests to reflect the change
                loadLeaveRequests(currentFilter);
            } catch (error) {
                console.error('Error rejecting by ID:', error);
                showMessage(message, 'error', error.message || 'Failed to reject leave');
            }
        }

        function showMessage(element, type, text) {
            element.className = `message ${type} show`;
            element.textContent = text;
            setTimeout(() => {
                element.classList.remove('show');
            }, 5000);
        }

        function showNotification(text, type) {
            // Log notifications instead of using popup alerts
            const level = type === 'error' ? 'error' : 'log';
            console[level](text);
        }

        function handleLogout() {
            // Clear stored authentication/session data
            localStorage.removeItem('leaveflow_token');
            localStorage.removeItem('leaveflow_role');
            localStorage.removeItem('leaveflow_employeeId');
            localStorage.removeItem('leaveflow_adminId');
            // Redirect to login page
            window.location.href = 'login (1).html';
        }

        function toggleUserMenu(event) {
            event.stopPropagation();
            const menu = document.getElementById('adminUserMenu');
            if (!menu) return;
            const isVisible = menu.style.display === 'block';
            menu.style.display = isVisible ? 'none' : 'block';
        }

        window.addEventListener('click', () => {
            const menu = document.getElementById('adminUserMenu');
            if (menu) {
                menu.style.display = 'none';
            }
        });

        // Initialize - load all requests on page load
        loadLeaveRequests('all');
    </script>
</body>
</html>
